<header class="header">
  <div class="header-content">
    <span class="header-title">Kanban Project Management Tool</span>
    <div class="header-logo">
      <img src="logo/join-mobile.svg" alt="Join Logo" />
    </div>

    @if (authService.isLoggedIn()) {
      <div class="header-actions">
        @if (!isHelpPage) {
        <a routerLink="/help" class="header-icon">
          <img src="icons/header/help-icon.svg" alt="Help" />
        </a>
        }

        <div class="avatar-wrapper" #menuWrapper>
          <app-avatar [name]="userName" [size]="55" [isHeader]="true" (click)="toggleMenu()" tabindex="0"></app-avatar>

          @if (menuOpen || isClosing) {
          <div class="user-menu" [class.closing]="isClosing">
            <a routerLink="/help" class="user-menu-item header-help-mobile">Help</a>
            <a routerLink="/legal-notice" class="user-menu-item" (click)="closeMenu()">Legal Notice</a>
            <a routerLink="/privacy-policy" class="user-menu-item" (click)="closeMenu()">Privacy Policy</a>
            <span class="user-menu-item" (click)="logout()">Log out</span>
          </div>
          }
        </div>
      </div>
    }
  </div>
</header>
