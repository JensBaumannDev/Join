@if (toastService.message()) {
  <div class="toast-container" 
       [class.show]="toastService.isVisible()" 
       [class.hide]="toastService.isHiding()">
    <div class="toast-content">
      {{ toastService.message() }}
      @if (toastService.showIcon()) {
        <img src="icons/board/board.svg" alt="board" class="toast-icon" />
      }
      
    </div>
  </div>
}
