<div class="task-detail-content">
  @if (isEditing()) {
    <app-task-edit
      [task]="task"
      [subtasks]="subtasks"
      (saved)="onEditSaved($event)"
      (closed)="closeDialog()"
    />
  } @else {
    <app-task-detail-view
      [task]="task"
      [subtasks]="subtasks"
      (closed)="closeDialog()"
      (deleted)="deleteTask()"
      (editClicked)="editTask()"
      (subtaskToggled)="toggleSubtask($event)"
    />
  }
</div>
