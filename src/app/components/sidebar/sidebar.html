<aside class="sidebar">

  <div class="sidebar-logo">
    <img src="logo/join-logo.svg" alt="Join Logo" />
  </div>

  <nav class="sidebar-nav">
    @if (authService.isLoggedIn()) {
      <a routerLink="/summary" routerLinkActive="active" class="nav-item">
        <img src="icons/sidebar/Summary-icon.svg" alt="" />
        <p>Summary</p>
      </a>
      <a routerLink="/add-task" routerLinkActive="active" class="nav-item">
        <img src="icons/sidebar/add-task-icon.svg" alt="" />
        <p>Add Task</p>
      </a>
      <a routerLink="/board" routerLinkActive="active" class="nav-item">
        <img src="icons/sidebar/board-icon.svg" alt="" />
        <p>Board</p>
      </a>
      <a routerLink="/contacts" routerLinkActive="active" class="nav-item">
        <img src="icons/sidebar/contacts-icon.svg" alt="" />
        <p>Contacts</p>
      </a>
    } @else {
      <div class="nav-group">
      <a routerLink="/login" routerLinkActive="active" class="nav-item">
        <img class="login-image" src="icons/sidebar/Log-In-icon.svg" alt="log-in-icon" />
        <p>Log In</p>
      </a>
      <div class="legal-group">
        <a routerLink="/privacy-policy" routerLinkActive="active" class="legal-item-first">
          <p>Privacy Policy</p>
        </a>
        <a routerLink="/legal-notice" routerLinkActive="active" class="legal-item">
          <p>Legal Notice</p>
        </a>
      </div>
      </div>

    }
    
  </nav>

  <div class="sidebar-footer">
    <a routerLink="/privacy-policy" routerLinkActive="active" class="footer-link">Privacy Policy</a>
    <a routerLink="/legal-notice" routerLinkActive="active" class="footer-link">Legal Notice</a>
  </div>

</aside>
