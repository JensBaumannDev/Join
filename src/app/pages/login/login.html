<section class="login-container">
  <section class="login-content">
    <div class="header">
      <div class="singup-line">
        <p>Not a Join user?</p>
        <button class="btn-primary">Sing up</button>
      </div>
    </div>

    <div class="login-form-box">
      <div class="headline">
        <h2>Log in</h2>
        <div class="separator"></div>
      </div>

      <form [formGroup]="form" class="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="custom-input">
          <input matInput formControlName="email" type="email" placeholder="Email" (input)="loginError.set(false)" />
          <img matSuffix src="icons/form/mail.svg" alt="mail" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="custom-input">
          <input matInput formControlName="password" [type]="showPassword() ? 'text' : 'password'" placeholder="Password" (input)="loginError.set(false)" />
          <img
            matSuffix
            [src]="showPassword() ? 'icons/form/visibility.svg' : 'icons/form/visibility_off.svg'"
            alt="toggle password visibility"
            (click)="togglePassword()"
            style="cursor: pointer"
          />
        </mat-form-field>

        @if (loginError()) {
          <p>Check your email and password. Please try again.</p>
        }
      </form>
      <div class="btns-container">
        <button class="btn-primary" type="submit" [disabled]="form.invalid">Login</button>
        <button class="btn-secondary">Guest Log in</button>
      </div>
    </div>
  </section>
</section>
