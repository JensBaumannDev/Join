<main class="summary_container">
    <div class="summary_headline">
        <h2>Join 360</h2>
        <div class="summary_headline__separator"></div>
        <h4>Key Metrics at a Glance</h4>
    </div>
    <section class="summary_card_content">
        <div class="summary-card summary-card--todo">
            <div class="summary-card__icon-container">
                <img src="icons/other/edit2.svg" alt="Stift Icon">
            </div>
            <div class="summary-card__counter">
                <h2>1</h2>
                <span>To-do</span>
            </div>
        </div>
        <div class="summary-card summary-card--done">
            <div class="summary-card__icon-container">
                <img src="icons/other/check2.svg" alt="Haken Icon">
            </div>
            <div class="summary-card__counter">
                <h2>1</h2>
                <span>Done</span>
            </div>
        </div>
        <div class="summary-card summary-card--urgency">
            <div class="summary-card--urgency__left">
                <div class="summary-card__icon-container summary-card__icon-container--urgent">
                    <img src="icons/board/prio-urgent_white.svg" alt="Urgent Icon">
                </div>
                <div class="summary-card__counter">
                    <h2>1</h2>
                    <span>Done</span>
                </div>
            </div>
            <div class="summary-card__separator"></div>
            <div class="summary-card__deadline">
                <div><span>Mai 18, 2026</span></div>
                <div>
                    <p>Upcoming Deadline</p>
                </div>
            </div>
        </div>

        <div class="summary-card summary-card--task-counter">
            <div class="summary-card__counter">
                <h2>1</h2>
                <span>Tasks in<br>Board</span>
            </div>
        </div>
        <div class="summary-card summary-card--task-progress">
            <div class="summary-card__counter">
                <h2>1</h2>
                <span>Tasks in<br>Progress</span>
            </div>
        </div>
        <div class="summary-card summary-card--await-feedback">
            <div class="summary-card__counter">
                <h2>1</h2>
                <span>Awaiting<br>Feedback</span>
            </div>
        </div>
    </section>
</main>
