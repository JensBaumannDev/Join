<div class="contacts">
  <!-- LEFT: SIDEBAR -->
  <div class="contacts__sidebar">
    <div class="contacts__sidebar-inner">
      <div class="btn-container">
        <button class="btn-primary contacts__add-btn">
          Add new contact
          <img class="contacts__add-icon" src="/icons/other/person_add.svg" alt="Add person icon" />
        </button>
      </div>
      <div class="contacts__list">
        @for (group of groupedContacts(); track group.letter) {
          <div class="contacts__group">
            <div class="contacts__group-letter">{{ group.letter }}</div>

            @for (c of group.contacts; track c.email) {
              <div class="contacts__item">
                <app-avatar [name]="c.name"></app-avatar>

                <div class="contacts__info">
                  <div class="contacts__name">{{ c.name }}</div>
                  <div class="contacts__email">{{ c.email }}</div>
                </div>
              </div>
            }
          </div>
        }
      </div>
    </div>
  </div>

  <!-- RIGHT: CONTENT -->
  <div class="contacts__content">
    <div class="contacts__header">
      <div class="contacts__title">Contacts</div>
      <div class="contacts__divider"></div>
      <div class="contacts__subtitle">Better with a team</div>
    </div>
  </div>
</div>
