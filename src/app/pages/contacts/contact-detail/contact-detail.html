<div class="content">
  @if (contact) {
  <div class="contacts__detail">
    <div class="contacts__detail-header-mobile">
      <div class="contacts__mobile-title-wrap">
        <div class="contacts__title-mobile">Contacts</div>
        <div class="contacts__subtitle-mobile">Better with a team</div>
        <div class="contacts__divider-mobile"></div>
      </div>
      <button class="contacts__back-btn" (click)="back.emit()">
        <img src="icons/other/arrow.svg" alt="Back" />
      </button>
    </div>
    <div class="contacts__detail-top">
      <app-avatar [name]="contact.name" [size]="120" [color]="contact.color"></app-avatar>
      <div class="contacts__detail-name-wrap">
        <div class="contacts__detail-name">
          {{ contact.name }}
          @if (isCurrentUserContact) {
            <span class="contacts__detail-you">(You)</span>
          }
        </div>
        <div class="contacts__detail-actions">
          <button class="contacts__action-btn" (click)="edit.emit()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
              class="contacts__action-img">
              <mask id="mask0_458103_1109" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="0" y="0" width="24"
                height="24">
                <rect width="24" height="24" fill="#D9D9D9" />
              </mask>
              <g mask="url(#mask0_458103_1109)">
                <path
                  d="M5 19H6.4L15.025 10.375L13.625 8.975L5 17.6V19ZM19.3 8.925L15.05 4.725L16.45 3.325C16.8333 2.94167 17.3042 2.75 17.8625 2.75C18.4208 2.75 18.8917 2.94167 19.275 3.325L20.675 4.725C21.0583 5.10833 21.2583 5.57083 21.275 6.1125C21.2917 6.65417 21.1083 7.11667 20.725 7.5L19.3 8.925ZM17.85 10.4L7.25 21H3V16.75L13.6 6.15L17.85 10.4Z"
                  fill="currentColor" />
              </g>
            </svg>
            <span class="contacts__action-text" data-text="Edit">Edit</span>
          </button>
          <button class="contacts__action-btn contacts__action-btn--delete" (click)="delete.emit()">
            <svg width="16" height="18" viewBox="0 0 16 18" fill="none" xmlns="http://www.w3.org/2000/svg"
              class="contacts__action-img">
              <path
                d="M3 18C2.45 18 1.97917 17.8042 1.5875 17.4125C1.19583 17.0208 1 16.55 1 16V3C0.716667 3 0.479167 2.90417 0.2875 2.7125C0.0958333 2.52083 0 2.28333 0 2C0 1.71667 0.0958333 1.47917 0.2875 1.2875C0.479167 1.09583 0.716667 1 1 1H5C5 0.716667 5.09583 0.479167 5.2875 0.2875C5.47917 0.0958333 5.71667 0 6 0H10C10.2833 0 10.5208 0.0958333 10.7125 0.2875C10.9042 0.479167 11 0.716667 11 1H15C15.2833 1 15.5208 1.09583 15.7125 1.2875C15.9042 1.47917 16 1.71667 16 2C16 2.28333 15.9042 2.52083 15.7125 2.7125C15.5208 2.90417 15.2833 3 15 3V16C15 16.55 14.8042 17.0208 14.4125 17.4125C14.0208 17.8042 13.55 18 13 18H3ZM3 3V16H13V3H3ZM5 13C5 13.2833 5.09583 13.5208 5.2875 13.7125C5.47917 13.9042 5.71667 14 6 14C6.28333 14 6.52083 13.9042 6.7125 13.7125C6.90417 13.5208 7 13.2833 7 13V6C7 5.71667 6.90417 5.47917 6.7125 5.2875C6.52083 5.09583 6.28333 5 6 5C5.71667 5 5.47917 5.09583 5.2875 5.2875C5.09583 5.47917 5 5.71667 5 6V13ZM9 13C9 13.2833 9.09583 13.5208 9.2875 13.7125C9.47917 13.9042 9.71667 14 10 14C10.2833 14 10.5208 13.9042 10.7125 13.7125C10.9042 13.5208 11 13.2833 11 13V6C11 5.71667 10.9042 5.47917 10.7125 5.2875C10.5208 5.09583 10.2833 5 10 5C9.71667 5 9.47917 5.09583 9.2875 5.2875C9.09583 5.47917 9 5.71667 9 6V13Z"
                fill="currentColor" />
            </svg>
            <span class="contacts__action-text" data-text="Delete">Delete</span>
          </button>
        </div>
      </div>
    </div>

    <div class="contacts__detail-section">
      <div class="contacts__detail-label">Contact Information</div>

      <div class="contacts__detail-field">
        <div class="contacts__detail-field-label">Email</div>
        <div class="contacts__detail-field-value contacts__detail-field-value--link">
          <a href="mailto:{{ contact.email }}">{{ contact.email }}</a>
        </div>
      </div>

      <div class="contacts__detail-field">
        <div class="contacts__detail-field-label">Phone</div>
        <div class="contacts__detail-field-value">
          <a href="tel:{{ contact.phone }}">{{ formatPhone(contact.phone) }}</a>
        </div>
      </div>
    </div>
  </div>
  }
</div>

<!-- MOBILE OPTIONS BUTTON -->
<button class="contacts__options-btn-mobile" (click)="openMobileMenu()">
  <img src="icons/other/close.svg" alt="Options" style="filter: brightness(0) invert(1)" />
</button>
@if (mobileMenuVisible()) {
<div class="contacts__mobile-menu-overlay" [class.slide-out]="!mobileMenuOpen()" (click)="closeMobileMenu()">
  <div class="user-menu contacts__mobile-menu" [class.slide-out]="!mobileMenuOpen()" (click)="$event.stopPropagation()">
    <button class="user-menu-item" (click)="edit.emit(); closeMobileMenu()">
      <img src="icons/other/edit.svg" alt="Edit" class="contacts__action-img" /> Edit
    </button>
    <button class="user-menu-item" (click)="delete.emit(); closeMobileMenu()">
      <img src="icons/other/delete.svg" alt="Delete" class="contacts__action-img" /> Delete
    </button>
  </div>
</div>
}
